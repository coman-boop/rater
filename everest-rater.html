<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everest — Fixed Indemnity Rate Engine</title>
<style>
.root{--bg:#F5EFE3;--bgD:#EBE1CF;--cd:#FEFBF4;--bd:#D4C5A9;--bl:#E8DCCB;--tx:#3D3526;--mu:#8A7D68;--ac:#B8860B;--al:#F5E8C8;--hd:#4A3F2F;--ht:#F5EFE3;--ib:#FFFDF6;--sb:#FAF5EA;--sh:rgba(61,53,38,.07);--wh:#FFF}
.root{min-height:100vh;background:linear-gradient(160deg,var(--bg),var(--bgD));font-family:'Palatino Linotype','Book Antiqua',serif;color:var(--tx);font-size:13px;line-height:1.4}.root *{margin:0;padding:0;box-sizing:border-box}
.root>header{background:linear-gradient(135deg,var(--hd),#5D4E3C);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px var(--sh);flex-wrap:wrap;gap:10px}
.logo{width:38px;height:38px;border-radius:7px;background:linear-gradient(135deg,var(--ac),#D4A017);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;color:var(--wh);font-family:'Trebuchet MS',sans-serif}
.hdr-left{display:flex;align-items:center;gap:14px}
.tabs{display:flex;gap:2px;background:rgba(255,255,255,.07);border-radius:7px;padding:2px}
.tab-btn{padding:7px 18px;border-radius:5px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:'Trebuchet MS',sans-serif;background:transparent;color:var(--bl);transition:all .2s}.tab-btn.active{background:var(--ac);color:var(--wh)}
.wrap{max-width:1260px;margin:0 auto;padding:20px 16px}.layout{display:grid;grid-template-columns:1fr 380px;gap:20px;align-items:start}.left{display:flex;flex-direction:column;gap:16px}
.card{background:var(--cd);border-radius:10px;border:1px solid var(--bd);box-shadow:0 2px 8px var(--sh)}.card-hdr{padding:12px 16px;background:var(--sb);border-bottom:1px solid var(--bd);font-size:13px;font-weight:700;border-radius:10px 10px 0 0}.card-body{padding:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
label.lbl{display:block;font-size:10px;font-weight:600;color:var(--mu);margin-bottom:3px;text-transform:uppercase;letter-spacing:.6px}.note{font-weight:400;color:var(--bl)}
input.inp,select.sel{padding:8px 10px;border:1.5px solid var(--bd);border-radius:6px;font-size:13px;background:var(--ib);color:var(--tx);font-family:inherit;outline:none;width:100%}
input.inp:focus,select.sel:focus{border-color:var(--ac)}select.sel{cursor:pointer}
.sh{font-size:12px;font-weight:700;color:var(--ac);margin:16px 0 10px}.sh:first-child{margin-top:0}
.sec-btn{width:100%;padding:11px 16px;display:flex;justify-content:space-between;align-items:center;border:none;background:var(--sb);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--tx);text-align:left;border-bottom:1px solid var(--bl)}.sec-btn.open{background:var(--al)}.sec-btn .arrow{font-size:16px;transition:transform .15s}.sec-btn.open .arrow{transform:rotate(90deg)}
.ben-row{padding:9px 16px;border-bottom:1px solid var(--bl);transition:background .1s}.ben-row:hover{background:var(--sb)}
.ben-top{display:flex;align-items:center;gap:10px;cursor:pointer}
.ben-row input[type=checkbox]{accent-color:var(--ac);width:16px;height:16px;cursor:pointer;flex-shrink:0}.ben-row input[disabled]{cursor:not-allowed}
.ben-name{flex:1;line-height:1.3}.ben-name.on{font-weight:600;color:var(--tx)}.ben-name.off{color:var(--mu)}
.req-badge{font-size:9px;background:var(--ac);color:var(--wh);padding:1px 6px;border-radius:3px;margin-left:6px;font-weight:700;text-transform:uppercase;vertical-align:middle}
.pmpm-tag{font-size:11px;background:var(--bgD);padding:3px 8px;border-radius:4px;font-family:'Courier New',monospace;color:var(--ac);font-weight:600;white-space:nowrap;flex-shrink:0}
.ben-fields{margin:6px 0 0 26px;display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.bf{min-width:100px}.bf .bf-l{font-size:9px;color:var(--mu);text-transform:uppercase;font-weight:600;margin-bottom:2px;white-space:nowrap}
.bf select,.bf input{padding:4px 6px;font-size:12px;border:1.5px solid var(--bd);border-radius:5px;background:var(--ib);color:var(--tx);font-family:inherit;cursor:pointer;width:100%}
.inline-wrap{display:flex;gap:16px;flex-wrap:wrap;padding:12px 16px;border-bottom:1px solid var(--bl)}.inline-wrap>div{min-width:200px}
.sidebar{position:sticky;top:20px}.sidebar-card{background:var(--cd);border-radius:10px;border:1px solid var(--bd);box-shadow:0 2px 8px var(--sh);overflow:hidden}
.sidebar-hdr{background:linear-gradient(135deg,var(--hd),#5D4E3C);padding:14px 16px;color:var(--ht);font-size:14px;font-weight:700}.sidebar-body{padding:16px}
.hero{text-align:center;margin-bottom:14px}.hero-lbl{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--mu)}.hero-val{font-size:38px;font-weight:700;color:var(--ac);font-family:'Trebuchet MS',sans-serif;line-height:1.1}.hero-sub{font-size:11px;color:var(--mu);margin-top:2px}
.rt{width:100%;border-collapse:collapse;margin-bottom:14px}.rt th{padding:7px 5px;font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase}.rt th:first-child{text-align:left}.rt th:not(:first-child){text-align:right}.rt td{padding:7px 5px;font-size:13px}.rt td:first-child{text-align:left;font-weight:600}.rt td:not(:first-child){text-align:right}.rt thead tr{border-bottom:2px solid var(--bd)}.rt tbody tr{border-bottom:1px solid var(--bl)}
.fb{background:var(--sb);border-radius:7px;padding:10px;margin-bottom:14px}.fb-t{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--mu);font-weight:700;margin-bottom:6px}
.fr{display:flex;justify-content:space-between;padding:2px 0;font-size:11px;color:var(--mu)}.fr.b{font-weight:700;color:var(--tx)}.fr span:last-child{font-family:'Courier New',monospace}
.el-list{max-height:220px;overflow-y:auto}.el-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid var(--bl)}.el-v{font-weight:600;color:var(--ac);font-family:'Courier New',monospace}
.code-box{background:var(--hd);border-radius:7px;padding:10px}.code-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--bl);font-weight:600;margin-bottom:4px}.code-val{font-family:'Courier New',monospace;font-size:10px;color:var(--ac);white-space:pre;line-height:1.5;max-height:260px;overflow-y:auto;display:block}
.btn{padding:6px 14px;background:var(--ac);color:var(--wh);border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;margin-top:6px}.btn-lg{padding:8px 20px;font-size:13px;border-radius:7px}
.decode-wrap{max-width:700px;margin:0 auto}.api-wrap{max-width:900px;margin:0 auto}
.api-pre{background:var(--hd);color:#C8E6C9;padding:16px;border-radius:8px;font-size:11px;line-height:1.6;overflow:auto;max-height:550px;font-family:'Courier New',monospace;white-space:pre-wrap}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px}.df{background:var(--cd);border-radius:5px;padding:6px 10px;border:1px solid var(--bl)}.df-l{font-size:9px;color:var(--mu);text-transform:uppercase}.df-v{font-size:13px;font-weight:600}
.warn{background:#FFF3CD;border:1px solid #FFCA2C;border-radius:6px;padding:8px 12px;font-size:12px;color:#664D03;margin-bottom:10px}
.tip{position:relative;display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--bd);color:var(--mu);font-size:10px;font-weight:700;cursor:help;flex-shrink:0;font-family:'Trebuchet MS',sans-serif;margin-left:4px;vertical-align:middle}.tip:hover{background:var(--ac);color:var(--wh)}
#g-tip{position:fixed;background:var(--hd);color:var(--ht);font-size:11px;padding:10px 14px;border-radius:6px;width:280px;line-height:1.45;box-shadow:0 4px 20px rgba(0,0,0,.25);z-index:9999;pointer-events:none;opacity:0;transition:opacity .12s;max-width:calc(100vw - 32px)}
#g-tip.show{opacity:1}#g-tip::after{content:'';position:absolute;border:6px solid transparent}
#g-tip.above::after{top:100%;left:50%;transform:translateX(-50%);border-top-color:var(--hd)}
#g-tip.below::after{bottom:100%;left:50%;transform:translateX(-50%);border-bottom-color:var(--hd)}
.lbl-row{display:flex;align-items:center;gap:0}
.root>footer{text-align:center;padding:20px;border-top:1px solid var(--bd);margin-top:32px;font-size:11px;color:var(--mu)}
.hidden{display:none}
/* ── Login screen ────────────────────────────── */
#login-screen{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#4A3F2F,#2C2418);display:flex;align-items:center;justify-content:center;font-family:'Palatino Linotype','Book Antiqua',serif}
#login-box{background:#FEFBF4;border-radius:14px;padding:40px 44px;width:360px;max-width:calc(100vw - 40px);box-shadow:0 8px 40px rgba(0,0,0,.4);text-align:center}
#login-box .login-logo{width:52px;height:52px;border-radius:10px;background:linear-gradient(135deg,#B8860B,#D4A017);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:24px;color:#fff;font-family:'Trebuchet MS',sans-serif;margin:0 auto 16px}
#login-box h1{font-size:18px;font-weight:700;color:#4A3F2F;margin-bottom:4px}
#login-box p{font-size:12px;color:#8A7D68;margin-bottom:28px;letter-spacing:.5px}
#login-box input{width:100%;padding:10px 12px;border:1.5px solid #D4C5A9;border-radius:7px;font-size:13px;font-family:inherit;background:#FFFDF6;color:#3D3526;margin-bottom:12px;outline:none;box-sizing:border-box}
#login-box input:focus{border-color:#B8860B}
#login-btn{width:100%;padding:11px;background:linear-gradient(135deg,#B8860B,#D4A017);color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:700;font-family:'Trebuchet MS',sans-serif;cursor:pointer;letter-spacing:.5px;margin-top:4px}
#login-btn:hover{opacity:.92}
#login-err{color:#B93A2B;font-size:12px;margin-top:10px;min-height:18px}

</head>
<body>
<!-- ── Login Screen ───────────────────────────────────────────── -->
<div id="login-screen">
  <div id="login-box">
    <div class="login-logo">E</div>
    <h1>Everest Rate Engine</h1>
    <p>Neo Insurance Solutions</p>
    <input type="text" id="login-user" placeholder="Username" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()">
    <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button id="login-btn" onclick="doLogin()">Sign In</button>
    <div id="login-err"></div>
  </div>
</div>
<div class="root" id="app-root" style="display:none">
<header><div class="hdr-left"><div class="logo">E</div><div><div style="color:var(--ht);font-size:17px;font-weight:700">Everest Reinsurance</div><div style="color:var(--bl);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-top:1px">Fixed Indemnity Rate Engine · EGFI 00 002 01 23</div></div></div><div class="tabs"><button class="tab-btn active" data-tab="quote">Quote Engine</button><button class="tab-btn" data-tab="decode">Election Verification</button><button class="tab-btn" data-tab="api">Sales Link</button></div></header>
<div class="wrap">
  <div id="tab-quote" class="layout">
    <div class="left">
      <div class="card"><div class="card-hdr">Rater Selection</div><div class="card-body"><div class="lbl-row"><label class="lbl">Rater Type</label><span class="tip" data-tip="Association Group or Individual rating context.">?</span></div><select class="sel" id="i-rt"><option selected>Association Group</option><option>Individual</option></select></div></div>
      <div class="card"><div class="card-hdr">Policyholder Information</div><div class="card-body"><div class="grid3">
        <div><label class="lbl">Quote Date</label><input class="inp" type="date" id="i-qd"></div><div><label class="lbl">Broker Name</label><input class="inp" id="i-bn"></div><div><label class="lbl">Policyholder Name</label><input class="inp" id="i-pn"></div><div><label class="lbl">Street</label><input class="inp" id="i-str"></div><div><label class="lbl">City</label><input class="inp" id="i-cty"></div><div><label class="lbl">State</label><select class="sel" id="i-st"></select></div><div><label class="lbl">Zip Code</label><input class="inp" id="i-zp"></div><div><label class="lbl">Effective Date</label><input class="inp" type="date" id="i-ed"></div><div><label class="lbl">Renewal Date</label><input class="inp" type="date" id="i-rd"></div>
        <div style="display:flex;gap:8px;align-items:center;font-size:11px;color:var(--mu);padding:4px 0"><span>Age: <strong style="color:var(--tx)">45</strong></span><span>·</span><span>Gender Split: <strong style="color:var(--tx)">50% M / 50% F</strong></span><span>·</span><span>UW Adj: <strong style="color:var(--tx)">1.00</strong></span><span style="font-size:10px;font-style:italic">(fixed)</span></div>
        <input type="hidden" id="i-age" value="45"><input type="hidden" id="i-mp" value="50"><input type="hidden" id="i-uwaf" value="1.00">
      </div></div></div>
      <div class="card"><div class="card-hdr">Section A: Global Adjustments</div><div class="card-body">
        <div class="sh" style="margin-top:0">1. Pre-existing Conditions</div><div class="grid2"><div><div class="lbl-row"><label class="lbl">Exclusion (Mo)</label><span class="tip" data-tip="Months pre-existing conditions excluded. Longer = lower rate.">?</span></div><select class="sel" id="i-pe"><option value="0">0</option><option value="3">3</option><option value="6">6</option><option value="9">9</option><option value="12" selected>12</option></select></div><div><div class="lbl-row"><label class="lbl">Look Back (Mo)</label><span class="tip" data-tip="How far back insurer reviews history.">?</span></div><select class="sel" id="i-pl"><option value="3">3</option><option value="6">6</option><option value="9">9</option><option value="12" selected>12</option><option value="24">24</option></select></div></div>
        <div class="sh">2. Underwriting</div><div class="lbl-row"><label class="lbl">Level</label><span class="tip" data-tip="GI = no medical questions. Simplified UW = health questionnaire, 10% rate reduction.">?</span></div><select class="sel" id="i-uw"><option>Guaranteed Issue</option><option>Simplified Underwriting</option></select>
        <div class="sh">3. UW Adjustment Factor</div><div style="font-size:12px;color:var(--mu);padding:2px 0"><strong style="color:var(--tx)">1.00</strong> <span style="font-size:10px;font-style:italic">(fixed)</span></div>
        <div class="sh">4. Coverage Tier</div>
        <div style="max-width:260px">
          <select class="sel" id="i-tier" onchange="recalc()">
            <option value="S">Single (Member)</option>
            <option value="ES">EE + Spouse</option>
            <option value="EC">EE + Child(ren)</option>
            <option value="F">Family</option>
          </select>
        </div>
      </div></div>
      <div class="card"><div class="card-hdr">Benefit Elections</div><div class="card-body" style="padding:0">
        <div class="inline-wrap">
          <div><div class="lbl-row"><label class="lbl">Coverage Type</label><span class="tip" data-tip="A&S = accident + illness. Accident-Only ≈ 11% of full rate.">?</span></div><select class="sel" id="i-ct"><option>Accident-Only</option><option selected>Accident &amp; Sickness</option></select></div>
          <div><div class="lbl-row"><label class="lbl">Limits Applied</label><span class="tip" data-tip="Per Person = individual limits. Per Certificate = shared limits.">?</span></div><select class="sel" id="i-lm"><option selected>Per Person</option><option>Per Certificate</option></select></div>
        </div>
        <div id="ben-container"></div>
      </div></div>
      <!-- ── Ancillary Products ────────────────────────────────── -->
      <div class="card" id="ancillary-card"><div class="card-hdr">Ancillary</div><div class="card-body" style="padding:0">
        <div id="anc-container"></div>
      </div></div>
    </div>
    <div class="sidebar"><div class="sidebar-card"><div class="sidebar-hdr">Rate Summary</div><div class="sidebar-body"><div id="r-warn"></div><div class="hero"><div class="hero-lbl" id="r-tier-lbl">Monthly Rate — Single</div><div class="hero-val" id="r-single">$0.00</div><div class="hero-sub" id="r-sub"></div></div><table class="rt"><thead><tr><th>Tier</th><th>Monthly</th></tr></thead><tbody id="r-tiers"></tbody></table><div class="fb"><div class="fb-t">Global Factors</div><div id="r-factors"></div></div><div class="fb"><div id="r-pmpm"></div></div><div class="fb el-list"><div class="fb-t">Elected Benefits — Monthly Single</div><div id="r-elected"></div></div><div class="fb" id="r-dental-fb" style="display:none"><div class="fb-t">Ancillary</div><div id="r-dental"></div></div><div class="code-box"><div class="code-lbl">Election Code</div><div class="code-val" id="r-code" style="font-size:9px;line-height:1.6"></div><div style="display:flex;gap:6px;margin-top:6px"><button class="btn" onclick="navigator.clipboard?.writeText(document.getElementById('r-code').textContent)">Copy</button><button class="btn" onclick="verifyElections()">Verify Elections</button></div></div></div></div></div>
  </div>
  <div id="tab-decode" class="decode-wrap hidden"><div class="card"><div class="card-hdr">Election Verification</div><div class="card-body"><p style="color:var(--mu);margin-bottom:14px">Paste a JSON election code array to verify the benefit configuration and see pricing.</p><div style="display:flex;gap:8px;margin-bottom:16px"><input class="inp" id="dec-in" placeholder='e.g. [{"ab":"DHC","amt":1000,"cy":"365 Days"},...]' style="flex:1;font-family:'Courier New',monospace"><button class="btn btn-lg" onclick="doDecode()">Verify</button></div><div id="dec-out"></div><div id="dec-enroll" style="display:none;margin-top:14px;text-align:center"><button class="btn btn-lg" onclick="goEnroll()" style="padding:10px 30px;font-size:14px">Proceed to Sales Link →</button></div></div></div></div>
  <div id="tab-api" class="api-wrap hidden">

    <!-- Step 1: Credentials -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-hdr">Step 1 — Authenticate</div>
      <div class="card-body">
        <div class="grid2" style="max-width:500px">
          <div><label class="lbl">Username</label><input class="inp" id="api-user" placeholder="username" autocomplete="username"></div>
          <div><label class="lbl">Password</label><input class="inp" id="api-pass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
        </div>
        <div style="margin-top:12px;display:flex;align-items:center;gap:12px">
          <button class="btn btn-lg" onclick="doAuth()">Authenticate</button>
          <span id="auth-status" style="font-size:12px;color:var(--mu)">Not authenticated</span>
        </div>
      </div>
    </div>

    <!-- Step 2: Applicant + Submit -->
    <div class="card"><div class="card-hdr">Step 2 — Applicant Details &amp; Create Sales Link</div><div class="card-body">
      <div class="sh" style="margin-top:0">Primary Applicant</div>
      <div class="grid3">
        <div><label class="lbl">First Name</label><input class="inp api-f" id="a-fn" placeholder="First"></div>
        <div><label class="lbl">Middle Name</label><input class="inp api-f" id="a-mn" placeholder="M"></div>
        <div><label class="lbl">Last Name</label><input class="inp api-f" id="a-ln" placeholder="Last"></div>
        <div><label class="lbl">Date of Birth</label><input class="inp api-f" id="a-dob" type="date"></div>
        <div><label class="lbl">Gender</label><select class="sel api-f" id="a-gen"><option value="M">Male</option><option value="F">Female</option></select></div>
        <div><label class="lbl">SSN</label><input class="inp api-f" id="a-ssn" placeholder="123456789" maxlength="9"></div>
        <div><label class="lbl">Email</label><input class="inp api-f" id="a-em1" type="email" placeholder="email@example.com"></div>
        <div><label class="lbl">Phone</label><input class="inp api-f" id="a-ph1" placeholder="8001234567"></div>
        <div><label class="lbl">Phone 2</label><input class="inp api-f" id="a-ph2" placeholder="Optional"></div>
        <div><label class="lbl">Address 1</label><input class="inp api-f" id="a-ad1" placeholder="123 Main St"></div>
        <div><label class="lbl">Address 2</label><input class="inp api-f" id="a-ad2" placeholder="Unit B"></div>
        <div><label class="lbl">City</label><input class="inp api-f" id="a-cty" placeholder="City"></div>
        <div><label class="lbl">State</label><input class="inp api-f" id="a-st" placeholder="FL" maxlength="2" style="text-transform:uppercase"></div>
        <div><label class="lbl">Zip Code</label><input class="inp api-f" id="a-zip" placeholder="33101"></div>
        <div><label class="lbl">Height (inches)</label><input class="inp api-f" id="a-hgt" placeholder="70" type="number" min="36" max="96"></div>
        <div><label class="lbl">Weight (lbs)</label><input class="inp api-f" id="a-wgt" placeholder="175" type="number" min="50" max="500"></div>
        <div><label class="lbl">Smoker</label><select class="sel api-f" id="a-smk"><option value="0">Non-Smoker</option><option value="1">Smoker</option></select></div>
      </div>
      <div class="sh">Dependents <button class="btn" style="margin:0 0 0 10px;padding:3px 10px;font-size:11px" onclick="addDep()">+ Add Dependent</button></div>
      <div id="dep-list"></div>
      <div class="sh">Beneficiary</div>
      <div class="grid3">
        <div><label class="lbl">Relationship</label><select class="sel api-f" id="b-rel"><option>Spouse</option><option>Child</option><option>Parent</option><option>Sibling</option><option>Cousin</option><option>Other</option></select></div>
        <div><label class="lbl">First Name</label><input class="inp api-f" id="b-fn"></div>
        <div><label class="lbl">Middle Name</label><input class="inp api-f" id="b-mn"></div>
        <div><label class="lbl">Last Name</label><input class="inp api-f" id="b-ln"></div>
        <div><label class="lbl">Date of Birth</label><input class="inp api-f" id="b-dob" type="date"></div>

// ═══ FACTOR CALCULATION (all 6 bugs fixed) ═══
function calcPF(bd,v){
  const fx=FIXED[bd.id]||{};
  // FIX BUG 1: Confinement benefits use matrix lookup for Limit A, corrected Limit B
  if(bd.ft==="C"){
    const dc=fx.dc||v.dc||10;
    const el=fx.el||v.el||"0-Day";
    const cy=fx.cy||v.cy||"365 Days";
    const inf=fx.inf!==undefined?fx.inf:(v.inf||0);
    const limitA=(DC[dc]||1)*(EL[el]||1);  // close approximation, <0.1% error
    const limitB=LB[dc]?.[cy]||1;          // FIX: correct 2D Limit B lookup
    return limitA*limitB*(IF_[inf]||1);
  }
  // FIX BUG 1: Facility confinement benefits use their own correct tables
  if(bd.ft==="FAC"){
    const md=fx.md||v.md||15;
    return FAC[bd.id]?.[md]||1;
  }
  if(bd.ft==="D"||bd.ft==="DN"){
    const md=fx.md||v.md;
    const dt=DT[bd.id]||{};
    const dayF=dt[md]||1;
    const inf=(bd.ft==="D")?(IF_[fx.inf!==undefined?fx.inf:(v.inf||0)]||1):1;
    return dayF*inf;
  }
  if(bd.ft==="A"){return (ADM[fx.adm||v.adm||1]||1)*(IF_[fx.inf!==undefined?fx.inf:(v.inf||0)]||1)}
  // FIX BUG 2: Anesthesia handled in recalc. FIX BUG 5: Surgical applies DT factor
  if(bd.ft==="AN")return 1;
  if(bd.ft==="SURG"){const md=fx.md||v.md||5;return DT[bd.id]?.[md]||1;}
  if(bd.ft==="NB"){return (DT[bd.id]?.[v.prg||1]||1)}
  // FIX BUG 4: CI = bp × amt×0.5 × reoccurrence 1.066 × wait 1.0
  if(bd.ft==="CI")return 1.066; // reoccurrence factor; amt halved in recalc; wait=30d→1.0
  // FIX BUG 3: AME — completely different; handled in recalc loop
  if(bd.ft==="AME")return 1;
  // Cancer skin cancer factor
  if(bd.ft==="CAN"){return CAN_SKIN[v.amt]?.[v.skinlim||1000]||1}
  return 1;
}

  DENTAL_PLANS.forEach(plan=>{

    const row=getDentalRow(plan,tier,state);

// ═══ CALC (ALL BUGS FIXED) ═══
// Formula: ROUND(benefitPMPM × M12 / TLR × ASC × tierMult, 2) per benefit, summed
// FIX BUG 5: Surgical = ROUND((IP_PMPM + OP_PMPM) × M12/TLR × ASC × tier, 2) — single round
// FIX BUG 2: Anesthesia = surgical_combined_PMPM × pct
// FIX BUG 3: AME = direct table lookup, NOT amt × bp
// FIX BUG 4: CI = amt × 0.5 × 0.000741 × 1.066 × agF
function recalc(){
  const state=document.getElementById('i-st').value,age=Math.min(80,Math.max(0,+document.getElementById('i-age').value||45));
  const mp=(+document.getElementById('i-mp').value||50)/100,ct=document.getElementById('i-ct').value,lm=document.getElementById('i-lm').value;
  const uwaf=Math.min(1.25,Math.max(.75,+document.getElementById('i-uwaf').value||1));
  const pxF=PX[(+document.getElementById('i-pe').value)+'-'+(+document.getElementById('i-pl').value)]||1;
  const uwF=UWL[document.getElementById('i-uw').value]||1;
  const M12=pxF*uwF*uwaf;
  const selTier=lm==='Per Person'?TIER.pp:TIER.pc;
  const res={};const tierR={S:0,ES:0,EC:0,F:0};let ec=0;

  // PASS 1: Calculate all non-surgical/non-anesthesia PMPMs + compute surgical combined
  let surgCombinedPMPM=0;
  const pmpms={}; // id → raw PMPM before M12/TLR/ASC/tier
  for(const bd of B){
    const v=ST[bd.id];if(!v.elected)continue;
    if(bd.ft==='AN')continue; // anesthesia handled in pass 2
    const agF=ageLK(bd.id,age,mp);if(agF===null)continue;
    const accF=ct==='Accident-Only'?bd.ao:1;
    const amt=v.amt;

    let pmpm;
    if(bd.ft==='AME'){
      // FIX BUG 3: Direct PMPM lookup
      const table=AME_PMPM[v.coins||80];
      pmpm=(table?.[amt]?.[v.ded||250]||0)*agF; // table is monthly PMPM, already includes benefit level
    } else if(bd.ft==='CI'){
      // FIX BUG 4: CI = amt × 50% × bp × reoccurrence × agF
      pmpm=amt*0.5*0.000741*1.066*accF*agF;
    } else if(bd.ft==='CAN'){
      // Cancer: amt × bp × skinFactor × waitFactor(1.0) × agF
      const skinF=CAN_SKIN[amt]?.[v.skinlim||1000]||1;
      pmpm=amt*bd.bp*accF*skinF*agF;
    } else if(bd.ft==='SURG'){
      // FIX BUG 5: Compute PMPM but don't emit yet — combine IP+OP
      const sf=szF(amt,bd.sz);const pf=calcPF(bd,v);
      pmpm=amt*bd.bp*accF*pf*sf*agF;
      surgCombinedPMPM+=pmpm;
      pmpms[bd.id]=pmpm;
      continue; // don't add to tiers yet
    } else {
      const sf=szF(amt,bd.sz);const pf=calcPF(bd,v);
      pmpm=amt*bd.bp*accF*pf*sf*agF;
    }
    pmpms[bd.id]=pmpm;
    // Add to tiers
    let tm;if(bd.tr==='pc')tm=TIER.pc;else if(bd.tr==='well')tm=TIER.well;else if(bd.tr==='ad1')tm=TIER.ad1;else if(bd.tr==='add')tm=TIER.add;else tm=selTier;
    ec++;
    const bR={};TK.forEach(k=>{bR[k]=Math.round(pmpm*M12/TLR*ASC*(tm[k]||1)*100)/100;tierR[k]+=bR[k]});
    res[bd.id]={n:bd.n,single:bR.S,amt};
    const tag=document.getElementById('pm-'+bd.id);if(tag&&tag.style.display!=='none')tag.textContent='$'+bR.S.toFixed(2)+'/mo';
  }

  // FIX BUG 5: Surgical combined — single ROUND for IP+OP together
  if(surgCombinedPMPM>0){
    const surgTm=selTier;
    const surgR={};TK.forEach(k=>{surgR[k]=Math.round(surgCombinedPMPM*M12/TLR*ASC*(surgTm[k]||1)*100)/100;tierR[k]+=surgR[k]});
    ec++;
    res['surg']={n:'6. Surgical (IP+OP combined)',single:surgR.S,amt:ST[6]?.amt||50000};
    // Update PMPM tags for both surgical sub-benefits
    [6,7].forEach(id=>{const tag=document.getElementById('pm-'+id);if(tag&&tag.style.display!=='none')tag.textContent='(combined)'});
  }

  // PASS 2: FIX BUG 2 — Anesthesia derives from surgical combined PMPM
  const anesBen=B.find(b=>b.id===9);
  if(anesBen&&ST[9].elected&&surgCombinedPMPM>0){
    const pct=(ST[9].amt||25)/100;
    const anesPMPM=surgCombinedPMPM*pct;
    const anesTm=selTier;
    ec++;
    const aR={};TK.forEach(k=>{aR[k]=Math.round(anesPMPM*M12/TLR*ASC*(anesTm[k]||1)*100)/100;tierR[k]+=aR[k]});
    res[9]={n:'8. Anesthesia ('+ST[9].amt+'% of Surgical)',single:aR.S,amt:ST[9].amt};
    const tag=document.getElementById('pm-9');if(tag&&tag.style.display!=='none')tag.textContent='$'+aR.S.toFixed(2)+'/mo';
  }

  const filedLR=SD_LR[state]||.48;
  const selTierKey=document.getElementById('i-tier')?.value||'S';
  const tierLblMap={S:'Single (Member)',ES:'EE + Spouse',EC:'EE + Child(ren)',F:'Family'};
  document.getElementById('r-warn').innerHTML=(TLR<filedLR)?`<div class="warn">${state} filed min LR ${(filedLR*100).toFixed(1)}%</div>`:'';
  document.getElementById('r-single').textContent='$'+tierR[selTierKey].toFixed(2);
  document.getElementById('r-sub').textContent=state+' · '+ct+' · '+tierLblMap[selTierKey]+' · '+ec+' benefit'+(ec!==1?'s':'');
  let th='';TL.forEach((l,i)=>{const k=TK[i];const isSel=k===selTierKey;th+=`<tr style="${isSel?'background:var(--al);font-weight:700':''}"><td>${l}${isSel?' ◀':''}</td><td>$${tierR[k].toFixed(2)}</td></tr>`});
  document.getElementById('r-tiers').innerHTML=th;
  document.getElementById('r-factors').innerHTML=fr('Pre-Existing',pxF.toFixed(4))+fr('Underwriting',uwF.toFixed(3))+fr('UW Adj',uwaf.toFixed(3))+fr('Aggregate',M12.toFixed(4),1);
  document.getElementById('r-pmpm').innerHTML=fr('÷ Target LR',(TLR*100)+'%')+fr('× Adult Single',ASC)+fr('= '+tierLblMap[selTierKey],'$'+tierR[selTierKey].toFixed(2),1);
  let eh='';for(const[id,r]of Object.entries(res))eh+=`<div class="el-row"><span>${r.n} ($${fmtAmt(r.amt)})</span><span class="el-v">$${r.single.toFixed(2)}</span></div>`;

// Try matching amount from known list (longest first)
function tryAmts(s,amts){
  const sorted=[...amts].sort((a,b)=>(''+b).length-(''+a).length||b-a);
  for(const a of sorted){const as=''+a;if(s.startsWith(as))return[a,as.length]}return null;
}
function encCode(){
  const arr=[];
  for(const e of EC){
    if(ST[e.id]?.elected){
      const raw=e.enc(ST[e.id]);
      const obj={ab:e.ab,name:e.nm};
      const d=e.dec(raw);
      if(d){const{len:_,...rest}=d;Object.assign(obj,rest);}
      arr.push(obj);
    }
  }
  return JSON.stringify(arr,null,2);
}
function decCode(code){
  if(!code)return null;
  let arr;
  try{arr=JSON.parse(code.trim());}catch(e){return null;}
  if(!Array.isArray(arr))return null;
  const byAb=Object.fromEntries(arr.map(o=>[o.ab,o]));
  return EC.map(e=>{
    const o=byAb[e.ab];
    if(!o)return{ab:e.ab,nm:e.nm,elected:false};
    const{ab:_,...fields}=o;
    return{ab:e.ab,nm:e.nm,elected:true,...fields};
  });
}

function updateTierPreview(){

async function doAuth(){
  const user=document.getElementById('api-user').value.trim();
  const pass=document.getElementById('api-pass').value;
  const statusEl=document.getElementById('auth-status');
  const submitBtn=document.getElementById('btn-submit');
  if(!user||!pass){statusEl.textContent='Enter username and password first.';statusEl.style.color='#B93A2B';return;}
  statusEl.textContent='Authenticating…';statusEl.style.color='var(--mu)';
  try{
    const resp=await fetch('https://enrollment123.com/auth',{
      method:'GET',
      headers:{'Authorization':'Basic '+btoa(user+':'+pass)}
    });
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const data=await resp.json();
    if(!data.JWT)throw new Error('No JWT returned');
    _jwtToken=data.JWT;
    statusEl.textContent='✓ Authenticated';statusEl.style.color='#3A7D44';
    submitBtn.disabled=false;submitBtn.style.opacity='1';submitBtn.style.cursor='pointer';submitBtn.style.background='var(--ac)';
  }catch(e){
    _jwtToken=null;
    statusEl.textContent='Failed: '+e.message;statusEl.style.color='#B93A2B';
    submitBtn.disabled=true;submitBtn.style.opacity='0.5';submitBtn.style.cursor='not-allowed';submitBtn.style.background='var(--hd)';
  }
}
async function createSalesLink(){
  const errEl=document.getElementById('api-error');
  const resultEl=document.getElementById('sales-link-result');
  const urlEl=document.getElementById('sales-link-url');
  errEl.style.display='none';resultEl.style.display='none';
  if(!_jwtToken){errEl.textContent='Not authenticated. Complete Step 1 first.';errEl.style.display='block';return;}
  const payload=buildPayload();
  const submitBtn=document.getElementById('btn-submit');
  const origTxt=submitBtn.textContent;
  submitBtn.textContent='Creating…';submitBtn.disabled=true;
  try{
    const resp=await fetch('https://enrollment123.com/order/checkout/connect/',{
      method:'POST',
      headers:{'Authorization':'Bearer '+_jwtToken,'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    const data=await resp.json();
    if(!resp.ok)throw new Error(data.message||data.error||'HTTP '+resp.status);
    const link=data.url||data.link||data.checkoutUrl||data.salesUrl||JSON.stringify(data);
    urlEl.textContent=link;
    resultEl.style.display='block';
    const pre=document.getElementById('api-json');
    pre.textContent=JSON.stringify(payload,null,2);
    pre.style.display='block';
  }catch(e){
    errEl.textContent='Error: '+e.message;errEl.style.display='block';
  }finally{
    submitBtn.textContent=origTxt;submitBtn.disabled=false;
  }
}
